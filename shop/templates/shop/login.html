{%extends "shop/layouts/main.html" %} {%block content%}
<div class="container" style="margin-top: 70px; min-height: 600px">
	<div class="row">
		<div class="col-12">
			<h4>Login Page</h4>
			<hr style="border-color: #b8bfc2" />
			<!--message-->
			{% include 'shop/inc/message.html' %}
		</div>
	</div>
	<section class="py-2 my-2">
		<div class="container">
			<div class="row">
				<div class="col-6">
					<form method="post" action="" novalidate class="shadow p-4 rounded">
						{% csrf_token %}
						<div class="mb-4">
							<label for="" class="form-label">User Name</label>
							<input
								type="text"
								name="username"
								class="form-control"
								id="username"
								placeholder="Enter User Name" />
						</div>
						<div class="mb-4">
							<label for="" class="form-label">Password</label>
							<input
								type="password"
								name="password"
								class="form-control"
								placeholder="Enter Password"
								id="password" />
						</div>
						<small
							><a href="{% url 'password_reset' %}">Forgot Password?</a></small
						>
						<br />
						<br />
						<button class="btn btn-primary" type="submit">Login</button>
						<br />
						<br />
						<div class="text-right text-primary fw-bold">
							<small
								>New User ?<a href="{% url 'register' %}" class="text-danger">
									Create an Account</a
								></small
							>
						</div>
					</form>
				</div>
			</div>
		</div>
	</section>
</div>
{%endblock%}
