{%extends "shop/layouts/main.html" %} {%block content%}

<section class="py-3 text-center container" style="margin-top: 70px;min-height:500px">
<div class="container">
  <div class="row">
    <div class="col-12">
      <h4 class="mb-3" style="text-align:left">Cart Items</h4>
      <hr style="border-color: #b8bfc2" />
      <!--message-->
			{% include 'shop/inc/message.html' %}
    </div>  
    <table class="">
        <tr>
            <th> Image </th>
            <th> Product Name </th>            
            <th> Price </th>
            <th> Remove </th>
        </tr>
        {% for item in favproducts %}
        <tr>
            <td><img src="{{item.product.product_image.url}}" alt="" height="75px" alt="{{item.product.name}}" /></td>
            <td>{{item.product.name}}</td>
            <td>{{item.product.selling_price | stringformat:'d'}}</td>
            <td><a href="{% url 'remove_fav' item.id %}" onclick="return confirm('Are you sure ? To remove')" class="btn btn-danger btn-sm"><i class="fa fa-trash"></i> Remove</a></td>
        </tr>
        {% endfor %}        
    </table>
  </div>
</section>


{%endblock%}
